<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0b1120; --card: #111c30; --card2: #16243d;
    --accent: #14b8a6; --accent-dim: #0f766e;
    --text: #e8eef6; --muted: #93a4bd; --line: #1f3050;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { min-height: 100vh; display: flex; flex-direction: column; }
  header {
    position: sticky; top: 0; z-index: 10; background: var(--bg);
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 0)) 16px;
    padding-top: calc(14px + env(safe-area-inset-top, 0));
    border-bottom: 1px solid var(--line);
  }
  h1 { font-size: 17px; margin: 0 0 10px 0; font-weight: 600; letter-spacing: .2px; }
  h1 span { color: var(--muted); font-weight: 400; }
  .searchbox { position: relative; }
  #q {
    width: 100%; font-size: 17px; padding: 14px 44px 14px 16px; border-radius: 14px;
    border: 1px solid var(--line); background: var(--card); color: var(--text);
    outline: none;
  }
  #q:focus { border-color: var(--accent); }
  #clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px; border: 0; border-radius: 50%; background: var(--card2);
    color: var(--muted); font-size: 18px; cursor: pointer; display: none;
  }
  main { flex: 1; padding: 12px 16px 40px 16px; }
  .hint { color: var(--muted); font-size: 14px; text-align: center; margin-top: 40px; line-height: 1.6; }
  .hint code { background: var(--card); padding: 2px 7px; border-radius: 6px; color: var(--accent); }
  .count { color: var(--muted); font-size: 13px; margin: 4px 2px 12px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .card.top { border-color: var(--accent-dim); background: var(--card2); }
  .row1 { display: flex; align-items: baseline; gap: 12px; }
  .code {
    font-size: 22px; font-weight: 700; color: var(--accent);
    min-width: 52px; font-variant-numeric: tabular-nums;
  }
  .desc { font-size: 17px; font-weight: 600; line-height: 1.25; }
  .capa { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .sins { color: var(--muted); font-size: 13px; margin-top: 8px; line-height: 1.5; }
  .sins b { color: #b9c6da; font-weight: 500; }
  mark { background: transparent; color: var(--accent); font-weight: 700; }
  .nores { text-align: center; color: var(--muted); margin-top: 36px; font-size: 15px; line-height: 1.6; }
</style>

function normalize(s){
  s = (s||"").toLowerCase();
  s = s.normalize("NFD").replace(/[̀-ͯ]/g, "");
  s = s.replace(/[^a-z0-9\s]/g, " ");
  s = s.replace(/\s+/g, " ").trim();
  return s;
}

DATA.forEach(c => {
  c._desc = normalize(c.descripcion);
  c._sins = (c.sinonimos||[]).map(normalize);
  const toks = new Set();
  [c._desc, ...c._sins].forEach(t => t.split(" ").forEach(w => { if(w) toks.add(w); }));
  c._tokens = toks;
});

function search(query, limit=8){
  const q = normalize(query);
  if(!q) return [];
  if(/^\d+$/.test(q)){
    const n = parseInt(q,10);
    const hit = DATA.filter(c => c.codigo === n);
    return hit.map(c => [0,c]);
  }
  const qtoks = q.split(" ");
  const scored = [];
  for(const c of DATA){
    let score = 999;
    if(c._desc === q) score = 1;
    else if(c._sins.includes(q)) score = 2;
    else if(c._desc.startsWith(q)) score = 10;
    else if(c._sins.some(s => s.startsWith(q))) score = 11;
    else if(c._desc.includes(q)) score = 20;
    else if(c._sins.some(s => s.includes(q))) score = 21;
    else {
      const common = qtoks.filter(t => c._tokens.has(t)).length;
      if(common) score = 100 - common;
      else if(qtoks.some(qt => [...c._tokens].some(t => t.startsWith(qt)))) score = 200;
    }
    if(score < 999) scored.push([score, c]);
  }
  scored.sort((a,b) => a[0]-b[0] || a[1].codigo-b[1].codigo);
  return scored.slice(0, limit);
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function highlight(text, q){
  const nq = normalize(q);
  if(!nq) return esc(text);
  let html = esc(text);
  for(const w of nq.split(" ")){
    if(w.length < 2) continue;
    const re = new RegExp("("+w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")", "gi");
    html = html.replace(re, "<mark>$1</mark>");
  }
  return html;
}

function render(q, hits){
  const out = document.getElementById("out");
  if(!q){
    out.innerHTML = '<div class="hint">Escribe el nombre de un elemento'
      + '<br>(<code>farola</code>, <code>bordillo</code>, <code>tapa de gas</code>)'
      + '<br>o el número del código (<code>13</code>).</div>';
    return;
  }
  if(!hits.length){
    out.innerHTML = '<div class="nores">No encontré nada para <b>'+esc(q)+'</b>.'
      + '<br>Prueba con otra palabra o un número.</div>';
    return;
  }
  let html = '<div class="count">'+hits.length+' resultado'+(hits.length>1?'s':'')+'</div>';
  hits.forEach(([score, c], i) => {
    const sins = (c.sinonimos||[]).slice(0,6).join(", ");
    html += '<div class="card'+(i===0?' top':'')+'">'
      + '<div class="row1"><div class="code">'+c.codigo+'</div>'
      + '<div class="desc">'+highlight(c.descripcion, q)+'</div></div>'
      + (c.capa ? '<div class="capa">Capa: '+esc(c.capa)+'</div>' : '')
      + (sins ? '<div class="sins"><b>Otros nombres:</b> '+highlight(sins, q)+'</div>' : '')
      + '</div>';
  });
  out.innerHTML = html;
}

const input = document.getElementById("q");
const clearBtn = document.getElementById("clear");
function update(){
  const q = input.value.trim();
  clearBtn.style.display = q ? "block" : "none";
  render(q, search(q));
}
input.addEventListener("input", update);
clearBtn.addEventListener("click", () => { input.value=""; update(); input.focus(); });
render("", []);
</script>
